<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>helloeve - Premium AI Web Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;500;600;700;800&family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Assistant', sans-serif;
        font-weight: 300;
        background-color: #FFFFFF;
        color: #14181f;
        margin: 0;
        overflow-x: hidden;
      }
      .glass-nav {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }
      .brand-accent {
        color: #e33670;
      }
      .bg-brand-accent {
        background-color: #e33670;
      }
      .premium-gradient-text {
        background: linear-gradient(135deg, #14181f 0%, #475569 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      /* --- Sticklight Style 3D Background --- */
      .hero-bg-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        overflow: hidden;
        background: #FFFFFF;
        pointer-events: none;
      }

      .bg-noise {
        position: absolute;
        inset: 0;
        opacity: 0.05;
        z-index: 5;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      
      .mesh-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        animation: float-mesh 25s infinite alternate ease-in-out;
        will-change: transform;
      }
      
      /* Pink Giant Blob */
      .blob-1 {
        width: 100vw;
        height: 100vw;
        background: radial-gradient(circle at center, rgba(227, 54, 112, 0.15) 0%, rgba(227, 54, 112, 0.05) 40%, transparent 70%);
        top: -30vw;
        left: -20vw;
      }
      
      /* Dark Soft Blob */
      .blob-2 {
        width: 80vw;
        height: 80vw;
        background: radial-gradient(circle at center, rgba(20, 24, 31, 0.06) 0%, transparent 70%);
        bottom: -20vw;
        right: -10vw;
        animation-delay: -5s;
      }
      
      /* Pink Secondary Accent */
      .blob-3 {
        width: 60vw;
        height: 60vw;
        background: radial-gradient(circle at center, rgba(227, 54, 112, 0.1) 0%, transparent 70%);
        top: 20%;
        right: 0%;
        animation-delay: -10s;
        animation-duration: 30s;
      }

      /* Glowing Center */
      .blob-4 {
        width: 40vw;
        height: 40vw;
        background: radial-gradient(circle at center, rgba(255, 255, 255, 0.8) 0%, transparent 60%);
        top: 15%;
        left: 20%;
        filter: blur(80px);
      }

      @keyframes float-mesh {
        0% { transform: translate(0, 0) scale(1) rotate(0deg); }
        50% { transform: translate(5%, 10%) scale(1.05) rotate(5deg); }
        100% { transform: translate(-2%, 5%) scale(0.95) rotate(-3deg); }
      }
      /* --- End Background --- */

      /* Premium Consistent Button Base */
      .btn-premium, .btn-secondary {
        border-radius: 2rem;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        font-weight: 500;
        letter-spacing: -0.01em;
      }

      .btn-premium {
        background: #14181f;
        color: #FFFFFF;
        border: 1px solid transparent;
      }
      .btn-premium:hover {
        background: #252b36;
        transform: translateY(-2px);
        box-shadow: 0 15px 30px -10px rgba(20, 24, 31, 0.25);
      }
      .btn-premium:active {
        transform: translateY(0);
      }

      .btn-secondary {
        background: #FFFFFF;
        color: #14181f;
        border: 1px solid #E2E8F0;
      }
      .btn-secondary:hover {
        background: #F8FAFC;
        border-color: #CBD5E1;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
      }
      
      .mockup-shadow {
        box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.08), 0 0 1px 0 rgba(0, 0, 0, 0.1);
      }
      h1, h2, h3, h4 {
        font-weight: 300;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.sh/@google/genai@^1.42.0",
          "react/": "https://esm.sh/react@^19.2.4/",
          "react": "https://esm.sh/react@^19.2.4",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
